services:
  vllm:
    image: nvcr.io/nvidia/vllm:26.01-py3
    container_name: ppt-translator-vllm
    profiles:
      - vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${HF_CACHE:-/home/curtburk/.cache/huggingface}:/root/.cache/huggingface
    ports:
      - "8093:8000"
    ipc: host
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command: >
      --model Qwen/Qwen3.6-35B-A3B
      --max-model-len 32768
      --gpu-memory-utilization 0.85
      --enable-prefix-caching
      --speculative-config '{"method": "dflash", "model": "z-lab/Qwen3.6-35B-A3B-DFlash", "num_speculative_tokens": 15}'
      --attention-backend flash_attn
      --kv-cache-dtype fp8_e4m3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ppt-translator-app
    ports:
      - "8092:8092"
    volumes:
      - ./output:/app/output
      - ./uploads:/app/uploads
    environment:
      - VLLM_URL=${VLLM_URL:-http://172.17.0.1:8091}
      - VLLM_MODEL=Qwen/Qwen3.6-35B-A3B
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8092/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
